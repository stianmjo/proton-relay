# ClusterSecretStore — references the bridge as a webhook backend.
# The BRIDGE_TOKEN is pulled from the same secret used by the bridge pod.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: protonpass
spec:
  provider:
    webhook:
      url: "http://proton-relay.external-secrets.svc/secret/{{ .remoteRef.key }}"
      result:
        jsonPath: "$.value"
      headers:
        Authorization: "Bearer {{ .auth.bridgeToken }}"
      secrets:
        - name: auth
          secretRef:
            namespace: external-secrets
            name: proton-relay
---
# ExternalSecret example — fetches a single field from a vault item.
#
# remoteRef.key format:  <ItemTitle>/<fieldname>
#
# Standard fieldnames:   password, username, email, url, note
# Custom fieldnames:     whatever you named them in Proton Pass
#
# Example: item "postgres" with field "password"
#   → bridge calls pass://Kubernetes/postgres/password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: protonpass
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: "postgres/password"
    - secretKey: username
      remoteRef:
        key: "postgres/username"