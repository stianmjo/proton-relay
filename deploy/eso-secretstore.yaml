apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: proton-relay
spec:
  provider:
    webhook:
      url: "http://proton-relay.external-secrets.svc:80/secret/{{ .remoteRef.key }}"
      result:
        jsonPath: "$.value"
      headers:
        Authorization: "Bearer {{ .auth.BRIDGE_TOKEN }}"
      secrets:
        - name: auth
          secretRef:
            namespace: external-secrets
            name: proton-relay
---
# ExternalSecret example
#
# remoteRef.key format:  <ItemTitle>/<fieldname>
#
# Field names by item type:
#
#   Login items:       username, password, email, url, totp
#   Credit card items: cardholder_name, number, expiration_date, verif_number, pin
#   Wifi items:        ssid, password
#   All item types:    title, note
#   Custom fields:     any name you gave the hidden/text field in Proton Pass
#
# Tip: use GET /fields/<ItemTitle> on the bridge to discover available fields.
#
# Example below: item "postgres" with two custom hidden fields
#   → bridge fetches pass://Kubernetes/postgres/username
#   → bridge fetches pass://Kubernetes/postgres/password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: proton-relay
  target:
    name: postgres
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: "postgres/username"
    - secretKey: password
      remoteRef:
        key: "postgres/password"
    # Custom hidden field example
    - secretKey: api-key
      remoteRef:
        key: "postgres/api-key"
    # Login item standard field example
    - secretKey: totp
      remoteRef:
        key: "postgres/totp"