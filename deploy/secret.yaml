apiVersion: v1
kind: Secret
metadata:
  name: proton-relay
  namespace: external-secrets
  labels:
    external-secrets.io/type: webhook
type: Opaque
stringData:
  # PAT created with:
  #   pass-cli pat create --name "random" --expiration 1y
  #   pass-cli pat access grant --pat-name "random" --vault-name "Kubernetes" --role viewer
  PROTON_PASS_PERSONAL_ACCESS_TOKEN: "pst_xxxx...xxxx::TOKENKEY"

  # Generate with:
  #   dd if=/dev/urandom bs=1 count=2048 2>/dev/null | sha256sum | awk '{print $1}'
  PROTON_PASS_ENCRYPTION_KEY: "your-generated-encryption-key"

  # Shared secret between ESO and the bridge — generate the same way
  BRIDGE_TOKEN: "your-bridge-token"